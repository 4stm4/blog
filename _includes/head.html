<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='16' fill='%23141218'/><text x='50' y='62' text-anchor='middle' font-family='monospace' font-size='48' font-weight='700' fill='%23D0BCFF'>~$</text></svg>">
  {%- seo -%}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="{{ '/assets/style.css' | relative_url }}" rel="stylesheet">
  <link href="{{ '/assets/highlight.css' | relative_url }}" rel="stylesheet">
  <link href="{{ '/assets/css/lang-switcher.css' | relative_url }}" rel="stylesheet">
  {%- assign page_description = page.description | default: page.excerpt | default: site.description -%}
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Blog",
      "name": {{ site.title | jsonify }},
      "url": {{ site.url | append: site.baseurl | jsonify }},
      "description": {{ page_description | strip_html | strip_newlines | strip | jsonify }},
      "inLanguage": {{ site.lang | default: 'ru' | jsonify }},
      "publisher": {
        "@type": "Person",
        "name": {{ site.author.name | default: site.title | jsonify }},
        "email": {{ site.author.email | default: site.email | jsonify }}
      }
    }
  </script>

</head>
